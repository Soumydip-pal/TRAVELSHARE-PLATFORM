services:
  - type: web
    name: travelshare-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://travelshare-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://travelshare-backend.onrender.com
      - key: REACT_APP_ML_URL
        value: https://travelshare-ml.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: travelshare-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ML_API_URL
        value: https://travelshare-ml.onrender.com
      - key: CLIENT_URL
        value: https://travelshare-frontend.onrender.com

  - type: web
    name: travelshare-ml
    runtime: python
    plan: free
    rootDir: ml
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn api.app:app -c gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
